name: ci-windows

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '.github/workflows/**'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        version:
          - stable
        target:
          - x86_64-pc-windows-msvc

    name: Check ${{ matrix.version }} - ${{ matrix.target }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version }}
          components: rustfmt, clippy

      - name: Check build
        run: cargo check --all --bins --tests

      - name: Check release build
        run: cargo check --all --bins --tests --release

      - name: Run tests
        timeout-minutes: 40
        run: cargo test --all --no-fail-fast -- --nocapture
